<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Relatório Jesus</title>

  <style>
   body { font-family: Arial, sans-serif; background: #f2f2f2; margin: 0; padding: 20px; }
    .barra { background: #fff; padding: 15px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.15); display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
    input { padding: 8px; width: 130px; font-weight: bold; text-align: center; }
    button { padding: 8px 14px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; background: #4a148c; color: #fff; }
    button:disabled { background: #999; cursor: not-allowed; }

    #telaLogin { position: fixed; inset: 0; background: #f4f7f6; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 300px; }
    .login-card input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
    .login-card button { width: 100%; padding: 10px; }

    .page { background: #fff; padding: 10mm; border-radius: 6px; }
    .bloco-destino { margin-bottom: 10mm; }
    .bloco-destino:last-child { margin-bottom: 0; }

    .titulo-geral { text-align: center; font-size: 16px; font-weight: bold; margin: 0 0 6px 0; text-transform: uppercase; }
    .meta { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; margin-bottom: 6px; font-weight: bold; }

    table { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; }
    th, td { border: 1px solid #000; padding: 4px; text-align: center; vertical-align: middle; }
    thead th { background: #eaeaea; text-transform: uppercase; }

    .left { text-align: left; }
    .total-linha { font-weight: bold; background: #f5f5f5; }

    .assinatura { display: none; margin-top: 12mm; text-align: center; font-size: 11px; break-inside: avoid; page-break-inside: avoid; }
    .assinatura .linha { margin-bottom: 4px; }

  @media print {
      body { background: #fff; padding: 0; margin: 0; }
      .barra, #telaLogin { display: none !important; }
      .page { padding: 4mm; border-radius: 0; }
      .assinatura { display: block; }
      .bloco-destino { page-break-inside: avoid; }
      @page { size: A4 landscape; margin: 8mm; }



  </style>
</head>

<body>

<div id="telaLogin">
  <div class="login-card">
    <h3 style="margin-top:0;">Acesso Restrito</h3>
    <input type="text" id="loginUser" placeholder="Usuário">
    <input type="password" id="loginPass" placeholder="Senha">
    <button onclick="fazerLogin()">ENTRAR</button>
    <div id="msgErro" style="color:red; font-size:12px; margin-top:10px; display:none;">Dados incorretos</div>
  </div>
</div>

<div id="conteudo" style="display:none;">

<div class="barra">
    <label>Data:</label>
    <input id="data" type="date">
    <button onclick="gerar()">GERAR</button>
    <button onclick="window.print()" id="btnPrint" disabled>IMPRIMIR</button>
  </div>

  </div>

 <div class="page" id="paginaRelatorio">
    <div id="blocoPorto" class="bloco-destino"></div>
    <div id="blocoPalmas" class="bloco-destino"></div>

  <div class="assinatura">
      <div class="linha">______________________________________________</div>
      <div class="linha"><strong>GLEICYANE CARDOSO SOUSA</strong></div>
      <div class="linha">ENFERMEIRA GERENTE DA ATENÇÃO BÁSICA</div>
      <div class="linha">DECRETO MUNICIPAL Nº 030/2025</div>
    </div>

</div>

<script>
const CREDENCIAIS = { "alsiony": "cko170560", "fernando": "#Caramelo1006", "gleicyane": "cko170560" };
const TEMPO_SESSAO_MINUTOS = 240;

window.onload = function() { verificarLogin(); renderMensagemInicial(); };

function verificarLogin() {
  const u = localStorage.getItem("sms_user");
  const p = localStorage.getItem("sms_pass");
  const t = localStorage.getItem("sms_time");
  const agora = new Date().getTime();
  const valido = u && p && CREDENCIAIS[u] === p && t && (agora - parseInt(t, 10)) / 1000 / 60 < TEMPO_SESSAO_MINUTOS;
 document.getElementById("telaLogin").style.display = valido ? "none" : "flex";
  document.getElementById("conteudo").style.display = valido ? "block" : "none";
}

function fazerLogin() {
  const u = document.getElementById("loginUser").value.toLowerCase().trim();
  const p = document.getElementById("loginPass").value.trim();
  if (CREDENCIAIS[u] && CREDENCIAIS[u] === p) {
    localStorage.setItem("sms_user", u);
    localStorage.setItem("sms_pass", p);
    localStorage.setItem("sms_time", new Date().getTime());
    document.getElementById("msgErro").style.display = "none";
    verificarLogin();
  } else {
    document.getElementById("msgErro").style.display = "block";
  }
}

function formatarDataBR(dataISO) {
  if (!dataISO) return "";
  const p = dataISO.split("-");
  return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : "";
}

function gerar() {
  const dataISO = document.getElementById("data").value;
  const dataBR = formatarDataBR(dataISO);
  const btnPrint = document.getElementById("btnPrint");

  btnPrint.disabled = true;

    if (!dataBR) {
    alert("Selecione uma data.");
    return;
  }

    renderCarregando(dataBR);

  google.script.run
.withSuccessHandler(res => {
      renderDestino("blocoPorto", "PORTO NACIONAL", dataBR, res.portoNacional || []);
      renderDestino("blocoPalmas", "PALMAS", dataBR, res.palmas || []);
      const totalGeral = (res.portoNacional || []).length + (res.palmas || []).length;
      btnPrint.disabled = totalGeral === 0;
    })
    .withFailureHandler(err => {
     const msg = `<p style='color:red;font-weight:bold;'>❌ Erro: ${err.message}</p>`;
      document.getElementById("blocoPorto").innerHTML = msg;
      document.getElementById("blocoPalmas").innerHTML = "";
    })
    .buscarDadosRelatorioJesusPorData(dataBR, localStorage.getItem("sms_user"), localStorage.getItem("sms_pass"));
}

function renderCarregando(data) {
  const msg = `
    <p class="titulo-geral">RELAÇÃO DOS PACIENTES COM TRATAMENTO FORA DE DOMICÍLIO</p>
    <div class="meta"><span>DATA: ${data}</span><span>NOME DA CIDADE DESTINO: --</span></div>
    <p style="font-weight:bold;">⏳ Carregando dados...</p>`;
  document.getElementById("blocoPorto").innerHTML = msg;
  document.getElementById("blocoPalmas").innerHTML = "";
}

function renderMensagemInicial() {
  document.getElementById("blocoPorto").innerHTML = "<p style='font-weight:bold;'>Selecione uma data e clique em GERAR.</p>";
  document.getElementById("blocoPalmas").innerHTML = "";
}

function renderDestino(containerId, cidade, data, lista) {
  const container = document.getElementById(containerId);

  if (!lista.length) {
    container.innerHTML = `
      <p class="titulo-geral">RELAÇÃO DOS PACIENTES COM TRATAMENTO FORA DE DOMICÍLIO</p>
      <div class="meta"><span>DATA: ${data}</span><span>NOME DA CIDADE DESTINO: ${cidade}</span></div>
      <p style="font-weight:bold;">Nenhum paciente para ${cidade}.</p>`;

    return;
  }

  const linhas = lista.map((p, idx) => `
    <tr>
 <td>${idx + 1}</td>
      <td class="left">${p.paciente}</td>
      <td class="left">${p.acompanhante}</td>
      <td>${p.telefone}</td>
      <td class="left">${p.motivo}</td>
      <td>${p.horario}</td>
      <td class="left">${p.local}</td>
      <td>${p.controle}</td>
    </tr>`).join("");

  container.innerHTML = `
    <p class="titulo-geral">RELAÇÃO DOS PACIENTES COM TRATAMENTO FORA DE DOMICÍLIO</p>
    <div class="meta"><span>DATA: ${data}</span><span>NOME DA CIDADE DESTINO: ${cidade}</span></div>
    <table>
      <thead>
        <tr>
          <th style="width:5%;">NÚMERO SEQUENCIAL</th>
          <th style="width:20%;">PACIENTE</th>
          <th style="width:20%;">ACOMPANHANTE</th>
          <th style="width:12%;">TELEFONE</th>
          <th style="width:15%;">MOTIVO</th>
          <th style="width:8%;">HORÁRIO</th>
          <th style="width:12%;">LOCAL</th>
          <th style="width:8%;">CONTROLE</th>
        </tr>
      </thead>
      <tbody>${linhas}</tbody>
      <tfoot>
        <tr class="total-linha"><td colspan="8">TOTAL DE PACIENTES: ${lista.length}</td></tr>
      </tfoot>
    </table>`;
}
</script>

</body>
</html>
